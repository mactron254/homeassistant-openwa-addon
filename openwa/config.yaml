name: OpenWA Bot ES
version: "0.4.0"
slug: openwa
description: OpenWA WhatsApp gateway with Spanish Home Assistant bot, Groq chat, and voice transcription
url: https://github.com/mactron254/homeassistant-openwa-addon
arch:
  - amd64
  - aarch64

startup: application
boot: auto
init: false
ingress: false
homeassistant_api: true

ports:
  2785/tcp: 2785
  2786/tcp: 2786

ports_description:
  2785/tcp: OpenWA dashboard and native API
  2786/tcp: OpenWA helper API

webui: "http://[HOST]:[PORT:2785]/"

map:
  - type: addon_config
    read_only: false

options:
  api_master_key: ""
  openwa_api_key: ""
  session_id: ""
  openwa_image: "ghcr.io/rmyndharis/openwa:latest"
  log_level: "info"
  engine_type: "baileys"
  whatsapp:
    allowed_senders:
      - "15551234567@c.us"
    recipients:
      primary: "15551234567@c.us"
  groq:
    api_key: ""
    profile: "free_balanced"
    chat_model: "llama-3.1-8b-instant"
    quality_model: "llama-3.3-70b-versatile"
    voice_model: "whisper-large-v3-turbo"
    max_audio_seconds: 120
    chunk_audio: false
    custom_limits:
      chat:
        rpm: 30
        rpd: 14400
        tpm: 6000
        tpd: 500000
      quality:
        rpm: 30
        rpd: 1000
        tpm: 12000
        tpd: 100000
      voice:
        rpm: 20
        rpd: 2000
        ash: 7200
        asd: 28800
  home_assistant:
    read:
      mode: "allowed_domains"
      domains:
        - sensor
        - binary_sensor
        - switch
        - light
        - climate
        - cover
        - number
        - input_number
        - select
        - input_select
    control:
      domains:
        switch: true
        light: true
        cover: true
        climate: true
        number: true
        input_number: true
        select: true
        input_select: true
        fan: true
      entities:
        deny: []
        allow: []
    critical:
      require_confirmation: true
      timeout_seconds: 300
      always_confirm_domains:
        - lock
        - alarm_control_panel
        - cover
        - climate

schema:
  api_master_key: password?
  openwa_api_key: password?
  session_id: str?
  openwa_image: str
  log_level: list(debug|info|warn|error)
  engine_type: list(baileys|whatsapp-web.js)
  whatsapp:
    allowed_senders:
      - str
    recipients:
      primary: str
  groq:
    api_key: password?
    profile: list(disabled|free_balanced|free_quality|custom)
    chat_model: str
    quality_model: str
    voice_model: str
    max_audio_seconds: int(1,)
    chunk_audio: bool
    custom_limits:
      chat:
        rpm: int(0,)
        rpd: int(0,)
        tpm: int(0,)
        tpd: int(0,)
      quality:
        rpm: int(0,)
        rpd: int(0,)
        tpm: int(0,)
        tpd: int(0,)
      voice:
        rpm: int(0,)
        rpd: int(0,)
        ash: int(0,)
        asd: int(0,)
  home_assistant:
    read:
      mode: list(allowed_domains)
      domains:
        - str
    control:
      domains:
        switch: bool
        light: bool
        cover: bool
        climate: bool
        number: bool
        input_number: bool
        select: bool
        input_select: bool
        fan: bool
      entities:
        deny:
          - str
        allow:
          - str
    critical:
      require_confirmation: bool
      timeout_seconds: int(30,)
      always_confirm_domains:
        - str
