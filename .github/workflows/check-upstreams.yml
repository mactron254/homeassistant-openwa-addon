name: Check upstreams

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream repositories
        shell: bash
        run: |
          set -euo pipefail
          addon_head="$(git ls-remote https://github.com/nomi25home/homeassistant-openwa-addon.git HEAD | awk '{print $1}')"
          openwa_head="$(git ls-remote https://github.com/rmyndharis/OpenWA.git HEAD | awk '{print $1}')"
          openwa_latest_tag="$(git ls-remote --tags --refs https://github.com/rmyndharis/OpenWA.git 'refs/tags/v*' | awk '{print $2}' | sed 's#refs/tags/##' | sort -V | tail -n 1)"
          {
            echo "## Upstream status"
            echo ""
            echo "- Add-on upstream HEAD: ${addon_head}"
            echo "- OpenWA upstream HEAD: ${openwa_head}"
            echo "- Latest OpenWA tag: ${openwa_latest_tag}"
            echo ""
            echo "This workflow is read-only. Update tags/remotes manually in a separate PR."
          } >> "$GITHUB_STEP_SUMMARY"
